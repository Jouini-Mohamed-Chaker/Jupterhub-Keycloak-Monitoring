proxy:
  secretToken: "ddf94699915e92f1b1803dabdd98307a7e6d3c0680f54ce2b984dae3d9adc176"

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - jupyter.local

hub:
  config:
    JupyterHub:
      authenticator_class: generic-oauth
    
    # This block ensures any user who logs in via Keycloak is allowed entry
    Authenticator:
      allow_all: true
    
    GenericOAuthenticator:
      client_id: jupyterhub
      client_secret: "c5VZMJPXfBc9CVL2SImm97KfdDsacPyv"
      oauth_callback_url: "http://jupyter.local/hub/oauth_callback"
      authorize_url: "http://keycloak.local/auth/realms/jhub/protocol/openid-connect/auth"      
      token_url: "http://keycloak-http.keycloak.svc.cluster.local/auth/realms/jhub/protocol/openid-connect/token"
      userdata_url: "http://keycloak-http.keycloak.svc.cluster.local/auth/realms/jhub/protocol/openid-connect/userinfo"
      login_service: "Keycloak"
      username_claim: "preferred_username"
      scope:
        - openid
        - profile      

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: kps   # match kube-prometheus-stack release name again