{{- if .Values.postgresql.enabled }}
{{- $secretName := include "keycloak-stack.postgresql.secretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/name: keycloak-stack-postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{- if $existing }}
  password: {{ index $existing.data "password" }}
  keycloak-admin-password: {{ index $existing.data "keycloak-admin-password" }}
  {{- else }}
  password: {{ (.Values.postgresql.password | default (randAlphaNum 24)) | b64enc }}
  keycloak-admin-password: {{ randAlphaNum 20 | b64enc }}
  {{- end }}
{{- end }}