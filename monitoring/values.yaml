grafana:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.local
  adminPassword: admin   # change if you care, it's local dev

prometheus:
  prometheusSpec:
    retention: 3d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi
    # allow ServiceMonitors outside the monitoring namespace (default is fine in recent chart versions, but explicit is safer)
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true

defaultRules:
  create: true